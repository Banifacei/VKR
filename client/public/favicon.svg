<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#111113"/>

  <!-- Book left page (curved, like open book) -->
  <path d="M27,21 C16,34 16,66 27,79 C38,73 48,62 50,50 C48,38 38,27 27,21Z" fill="white"/>

  <!-- Play triangle (right) -->
  <path d="M50,27 L80,50 L50,73Z" fill="white"/>

  <!-- Spine separator -->
  <line x1="50" y1="24" x2="50" y2="76" stroke="#111113" stroke-width="5"/>

  <!-- Blue glow outer -->
  <circle cx="50" cy="50" r="13" fill="rgba(0,188,255,0.18)"/>
  <!-- Blue dot -->
  <circle cx="50" cy="50" r="7.5" fill="#00bcff"/>
</svg>
