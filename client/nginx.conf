server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml font/woff2;

    # Максимальный размер загружаемого файла (видео до 5 ГБ)
    client_max_body_size 5000M;

    # Таймаут для долгих загрузок видео
    proxy_read_timeout 36000s;
    proxy_send_timeout 36000s;

    # ------------------------------------------------------------------
    # SSE-потоки — отключаем буферизацию, держим соединение открытым
    # ------------------------------------------------------------------
    location ~* ^/api/.*stream {
        proxy_pass         http://server:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';   # keep-alive для SSE

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;   # 24 часа — SSE живёт пока пользователь на сайте
        chunked_transfer_encoding on;
        add_header         X-Accel-Buffering no;
    }

    # ------------------------------------------------------------------
    # API — проксируем на backend (без ^~ чтобы regex SSE-location выше брала приоритет)
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://server:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Повторять запрос при недоступности сервера (retry при 502/503)
        proxy_connect_timeout      5s;
        proxy_next_upstream        error timeout http_502 http_503;
        proxy_next_upstream_tries  3;
        proxy_next_upstream_timeout 15s;
    }

    # ------------------------------------------------------------------
    # Загруженные файлы (видео, аватары, логотипы)
    # Раздаём напрямую из тома — без проксирования через Node.js
    # ------------------------------------------------------------------
    location ^~ /uploads/ {
        alias              /app/uploads/;
        sendfile           on;
        tcp_nopush         on;
        add_header         Cache-Control "public, max-age=604800, immutable";
        add_header         Accept-Ranges bytes;
    }

    # ------------------------------------------------------------------
    # React SPA — все остальные пути → index.html
    # ------------------------------------------------------------------
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # Кэширование статических ассетов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
