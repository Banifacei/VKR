server {
    listen 80;
    server_name _;

    # Максимальный размер загружаемого файла (видео до 500 МБ)
    client_max_body_size 50000M;

    # Таймаут для долгих загрузок видео
    proxy_read_timeout 36000s;
    proxy_send_timeout 36000s;

    # ------------------------------------------------------------------
    # API — проксируем на backend (^~ → приоритет над regex-правилами)
    # ------------------------------------------------------------------
    location ^~ /api/ {
        proxy_pass         http://server:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Загруженные файлы (видео, аватары, логотипы) — проксируем на backend
    # ^~ гарантирует, что .png/.jpg не перехватит regex-блок статики
    # ------------------------------------------------------------------
    location ^~ /uploads/ {
        proxy_pass         http://server:5001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ------------------------------------------------------------------
    # React SPA — все остальные пути → index.html
    # ------------------------------------------------------------------
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # Кэширование статических ассетов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
