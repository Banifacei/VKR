services:
  postgres:
    image: postgres:15
    container_name: lumeo-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: lumeo-ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & until ollama list >/dev/null 2>&1; do sleep 2; done && ollama pull qwen2.5:3b && wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q qwen2.5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default

  server:
    image: ghcr.io/banifacei/lumeo-server:latest
    container_name: lumeo-server
    env_file: .env
    environment:
      DB_HOST: postgres
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5001/api/theme',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - default

  client:
    image: ghcr.io/banifacei/lumeo-client:latest
    container_name: lumeo-client
    volumes:
      - uploads:/app/uploads:ro
    networks:
      - default
      - proxy
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: lumeo-piston
    privileged: true
    volumes:
      - piston_packages:/piston/packages
    tmpfs:
      - /piston/jobs
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2000/api/v2/runtimes || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  watchtower:
      image: containrrr/watchtower
      container_name: lumeo-watchtower
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
      environment:
        - DOCKER_API_VERSION=1.41
      command: --http-api-token lumeo-wt-secret --http-api-update --label-enable --cleanup
      restart: unless-stopped
      networks:
        - default

volumes:
  postgres_data:
  uploads:
  ollama_data:
  piston_packages:

networks:
  proxy:
    external: true
