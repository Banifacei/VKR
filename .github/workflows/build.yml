name: Build & Push to ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # ── Безопасность: сканирование образов на уязвимости ──────────────────────
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Создаём пустой .env чтобы docker compose config не падал на env_file
      - name: Validate docker-compose
        run: |
          touch .env
          docker compose config --quiet

      # Сканирование Piston (privileged-контейнер — приоритет)
      - name: Scan Piston image (Trivy)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'ghcr.io/engineer-man/piston'
          format: 'sarif'
          output: 'trivy-piston.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Piston scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-piston.sarif') != ''
        with:
          sarif_file: 'trivy-piston.sarif'
          category: 'piston'

      # Сканирование файловой системы сервера (Dockerfile + зависимости)
      - name: Scan server source (Trivy fs)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: './server'
          format: 'sarif'
          output: 'trivy-server-fs.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload server fs scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-server-fs.sarif') != ''
        with:
          sarif_file: 'trivy-server-fs.sarif'
          category: 'server-fs'

  # ── Сборка и пуш образов ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ghcr.io требует строчные буквы — приводим owner к lowercase
      - name: Determine image tags
        id: tag
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "tags_server=ghcr.io/${OWNER}/lumeo-server:${VERSION},ghcr.io/${OWNER}/lumeo-server:latest" >> $GITHUB_OUTPUT
            echo "tags_client=ghcr.io/${OWNER}/lumeo-client:${VERSION},ghcr.io/${OWNER}/lumeo-client:latest" >> $GITHUB_OUTPUT
            echo "tags_installer=ghcr.io/${OWNER}/lumeo-installer:${VERSION},ghcr.io/${OWNER}/lumeo-installer:latest" >> $GITHUB_OUTPUT
          else
            echo "tags_server=ghcr.io/${OWNER}/lumeo-server:latest" >> $GITHUB_OUTPUT
            echo "tags_client=ghcr.io/${OWNER}/lumeo-client:latest" >> $GITHUB_OUTPUT
            echo "tags_installer=ghcr.io/${OWNER}/lumeo-installer:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build & push lumeo-server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tag.outputs.tags_server }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push lumeo-client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tag.outputs.tags_client }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build & push lumeo-installer
        uses: docker/build-push-action@v5
        with:
          context: ./installer
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tag.outputs.tags_installer }}
          cache-from: type=gha,scope=installer
          cache-to: type=gha,mode=max,scope=installer

      # Сканируем собранный образ сервера (уже с реальным содержимым)
      - name: Scan built lumeo-server image (Trivy)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/lumeo-server:latest'
          format: 'sarif'
          output: 'trivy-server.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload lumeo-server scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-server.sarif') != ''
        with:
          sarif_file: 'trivy-server.sarif'
          category: 'lumeo-server'
