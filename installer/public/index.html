<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LumeoLoadpad — Установка Lumeo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;
  --surface:#14142a;
  --surface2:#1a1a35;
  --border:#2a2a50;
  --accent:#6c63ff;
  --accent2:#8b85ff;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#f59e0b;
  --text:#e2e2f0;
  --text2:#9999cc;
  --radius:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}

/* Steps bar */
.steps{display:flex;align-items:center;gap:0;margin-bottom:32px;width:100%;max-width:720px}
.step-item{display:flex;align-items:center;flex:1}
.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;transition:.3s;background:var(--surface)}
.step-dot.active{border-color:var(--accent);background:var(--accent);color:#fff}
.step-dot.done{border-color:var(--green);background:var(--green);color:#fff}
.step-line{flex:1;height:2px;background:var(--border);transition:.3s}
.step-line.done{background:var(--green)}
.step-label{font-size:11px;color:var(--text2);margin-top:4px;text-align:center;width:32px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:720px;box-shadow:var(--shadow)}
.card-title{font-size:1.2rem;font-weight:600;margin-bottom:6px}
.card-sub{color:var(--text2);font-size:.9rem;margin-bottom:24px;line-height:1.5}

/* Form */
.field{margin-bottom:18px}
.field label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.95rem;outline:none;transition:.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.15)}
.field input::placeholder{color:var(--text2)}
.field textarea{resize:vertical;min-height:80px}
.field .hint{font-size:.78rem;color:var(--text2);margin-top:5px;line-height:1.4}
.field .hint a{color:var(--accent2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* Input with button */
.input-action{display:flex;gap:8px}
.input-action input{flex:1}

/* Buttons */
.btn{padding:10px 22px;border-radius:8px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-sm{padding:7px 14px;font-size:.82rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.actions-right{display:flex;gap:10px}

/* Check results */
.check-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:var(--surface2);margin-bottom:8px}
.check-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.check-icon.ok{background:rgba(34,197,94,.2);color:var(--green)}
.check-icon.fail{background:rgba(239,68,68,.2);color:var(--red)}
.check-label{font-weight:500;font-size:.9rem}
.check-value{margin-left:auto;font-size:.82rem;color:var(--text2)}

/* Admin cards */
.admin-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.admin-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;position:relative}
.admin-card .badge{position:absolute;top:12px;right:12px;font-size:.72rem;padding:3px 8px;border-radius:20px;background:rgba(108,99,255,.2);color:var(--accent2);font-weight:600}
.admin-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;line-height:1}
.admin-remove:hover{color:var(--red)}

/* Optional badge */
.optional-badge{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;padding:4px 10px;border-radius:20px;background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.25);margin-bottom:16px}

/* Log terminal */
.terminal{background:#0a0a14;border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'Courier New',monospace;font-size:.82rem;height:280px;overflow-y:auto;margin-bottom:16px}
.terminal .log-info{color:#888}
.terminal .log-log{color:#aaa}
.terminal .log-warn{color:var(--yellow)}
.terminal .log-success{color:var(--green)}
.terminal .log-error{color:var(--red)}

/* Progress */
.progress-wrap{height:6px;background:var(--surface2);border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s;width:0%}

/* Done screen */
.done-icon{font-size:56px;text-align:center;margin-bottom:16px}
.done-title{font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:8px}
.done-sub{color:var(--text2);text-align:center;font-size:.95rem;margin-bottom:28px;line-height:1.6}
.skipped-list{border:1px solid rgba(245,158,11,.25);background:rgba(245,158,11,.05);border-radius:8px;padding:16px;margin-bottom:20px}
.skipped-list h4{font-size:.9rem;color:var(--yellow);margin-bottom:10px}
.skipped-list li{font-size:.85rem;color:var(--text2);margin-left:16px;margin-bottom:4px;line-height:1.5}
.skipped-list li a{color:var(--accent2)}
.open-btn{width:100%;padding:14px;font-size:1rem;border-radius:10px;background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff;border:none;cursor:pointer;font-weight:700;transition:.2s}
.open-btn:hover{opacity:.9;transform:translateY(-1px)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:500px;width:90%;box-shadow:var(--shadow)}
.modal-warn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:14px;margin-bottom:20px;text-align:center}
.modal-warn strong{color:var(--red);font-size:1.1rem;display:block;margin-bottom:6px}
.modal-warn span{font-size:.85rem;color:var(--text2)}
.cred-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border-radius:8px;margin-bottom:8px}
.cred-label{font-size:.82rem;color:var(--text2)}
.cred-val{font-family:monospace;font-size:.9rem;color:var(--text);word-break:break-all;text-align:right}
.modal-timer{text-align:center;color:var(--text2);font-size:.85rem;margin-top:16px}
.modal-timer span{color:var(--accent2);font-weight:700}

/* Alerts */
.alert{padding:12px 16px;border-radius:8px;font-size:.88rem;margin-bottom:16px;line-height:1.5}
.alert-info{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.25);color:var(--accent2)}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--yellow)}

/* Updater mode */
.updater-card{text-align:center;padding:40px 32px}
.updater-icon{font-size:48px;margin-bottom:16px}
.updater-title{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.updater-sub{color:var(--text2);font-size:.9rem;margin-bottom:28px;line-height:1.5}

@media(max-width:600px){.row2,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-icon">🎓</div>
  <h1>LumeoLoadpad</h1>
</div>

<div id="steps-bar" class="steps" style="display:none"></div>

<div id="app" class="card"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const STEPS = [
  { id: 'check',   label: '⚙️', title: 'Проверка' },
  { id: 'config',  label: '📋', title: 'Настройки' },
  { id: 'admins',  label: '👤', title: 'Админы' },
  { id: 'email',   label: '✉️', title: 'Email' },
  { id: 'install', label: '🚀', title: 'Установка' },
  { id: 'done',    label: '✅', title: 'Готово' },
];

let appState = { step: 'check', installed: false, installing: false, skippedSteps: [], config: {}, admins: [] };
let checkResults = [];
let logEs = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const s = await api('GET', '/api/state');
  Object.assign(appState, s);
  if (appState.installed && appState.step !== 'install') {
    renderUpdater();
    return;
  }
  if (appState.step === 'install' || appState.installing) {
    renderStepsBar(appState.step);
    renderInstall();
    return;
  }
  renderStepsBar(appState.step || 'check');
  render(appState.step || 'check');
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const r = await fetch(url, { method, headers: body ? {'Content-Type':'application/json'} : {}, body: body ? JSON.stringify(body) : undefined });
  return r.json();
}

// ─── Steps bar ────────────────────────────────────────────────────────────────
function renderStepsBar(currentStep) {
  const bar = document.getElementById('steps-bar');
  bar.style.display = 'flex';
  const curIdx = STEPS.findIndex(s => s.id === currentStep);
  let html = '';
  STEPS.forEach((s, i) => {
    const isDone = i < curIdx;
    const isActive = i === curIdx;
    html += `<div class="step-item">`;
    html += `<div style="display:flex;flex-direction:column;align-items:center">
      <div class="step-dot ${isDone?'done':isActive?'active':''}">${isDone?'✓':s.label}</div>
      <div class="step-label" style="color:${isActive?'var(--accent2)':isDone?'var(--green)':'var(--text2)'}">${s.title}</div>
    </div>`;
    if (i < STEPS.length - 1) html += `<div class="step-line ${isDone?'done':''}"></div>`;
    html += `</div>`;
  });
  bar.innerHTML = html;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(step) {
  renderStepsBar(step);
  if (step === 'check')   renderCheck();
  if (step === 'config')  renderConfig();
  if (step === 'admins')  renderAdmins();
  if (step === 'email')   renderEmail();
  if (step === 'install') renderInstall();
  if (step === 'done')    renderDone();
}

// ─── Step: System check ───────────────────────────────────────────────────────
async function renderCheck() {
  document.getElementById('app').innerHTML = `
    <div class="card-title">Проверка системы</div>
    <div class="card-sub">Проверяем что всё готово для установки Lumeo</div>
    <div id="check-results"><div style="color:var(--text2);text-align:center;padding:20px">⏳ Проверяем...</div></div>
    <div class="actions"><div></div><button class="btn btn-primary" id="btn-next" disabled>Далее →</button></div>
  `;
  const { results } = await api('GET', '/api/system-check');
  checkResults = results;
  const allOk = results.every(r => r.ok);
  let html = '';
  for (const r of results) {
    html += `<div class="check-item">
      <div class="check-icon ${r.ok?'ok':'fail'}">${r.ok?'✓':'✗'}</div>
      <div class="check-label">${r.label}</div>
      <div class="check-value">${r.value}</div>
    </div>`;
  }
  if (!allOk) html += `<div class="alert alert-warn" style="margin-top:12px">⚠️ Есть предупреждения — установка возможна, но могут возникнуть проблемы</div>`;
  document.getElementById('check-results').innerHTML = html;
  const btn = document.getElementById('btn-next');
  btn.disabled = false;
  btn.onclick = () => render('config');
}

// ─── Step: Config ─────────────────────────────────────────────────────────────
function renderConfig() {
  const c = appState.config;
  document.getElementById('app').innerHTML = `
    <div class="card-title">Основные настройки</div>
    <div class="card-sub">Заполните параметры подключения. Если оставить пароли пустыми — они будут сгенерированы автоматически.</div>

    <div style="font-size:.9rem;font-weight:600;color:var(--accent2);margin-bottom:12px">🗄️ База данных</div>
    <div class="row3">
      <div class="field"><label>Название БД</label><input id="db-name" placeholder="lumeo_db" value="${c.DB_NAME||'lumeo_db'}"/></div>
      <div class="field"><label>Пользователь БД</label><input id="db-user" placeholder="lumeo" value="${c.DB_USER||'lumeo'}"/></div>
      <div class="field"><label>Порт БД</label><input id="db-port" placeholder="5432" value="${c.DB_PORT||'5432'}"/></div>
    </div>
    <div class="field"><label>Пароль БД <span style="color:var(--text2)">(оставьте пустым — сгенерируем)</span></label>
      <div class="input-action"><input id="db-pass" type="password" placeholder="Оставьте пустым для автогенерации" value="${c.DB_PASSWORD&&c.DB_PASSWORD!='***'?c.DB_PASSWORD:''}"/>
      <button class="btn btn-secondary btn-sm" onclick="genPass('db-pass')">🎲 Генерировать</button></div>
    </div>

    <div style="font-size:.9rem;font-weight:600;color:var(--accent2);margin-bottom:12px;margin-top:8px">🔐 Безопасность</div>
    <div class="field"><label>JWT Secret <span style="color:var(--text2)">(оставьте пустым — сгенерируем)</span></label>
      <div class="input-action"><input id="jwt-secret" type="password" placeholder="Оставьте пустым для автогенерации" value="${c.JWT_SECRET&&c.JWT_SECRET!='***'?c.JWT_SECRET:''}"/>
      <button class="btn btn-secondary btn-sm" onclick="genPass('jwt-secret',48)">🎲 Генерировать</button></div>
    </div>

    <div style="font-size:.9rem;font-weight:600;color:var(--accent2);margin-bottom:12px;margin-top:8px">🌐 Публичный адрес</div>
    <div class="field"><label>URL сервиса <span style="color:var(--text2)">(с http/https, без / в конце)</span></label>
      <input id="client-url" placeholder="https://lumeo.university.edu или http://192.168.1.10" value="${c.CLIENT_URL||''}"/>
      <div class="hint">Используется для CORS, SSO-редиректов и ссылок в письмах. Если используете домен — укажите домен, если IP — укажите IP с портом.</div>
    </div>
    <div class="field"><label>Внешний порт <span style="color:var(--text2)">(на каком порту будет доступен Lumeo)</span></label>
      <input id="expose-port" placeholder="80" value="${c.EXPOSE_PORT||'80'}"/>
      <div class="hint">Если стоит reverse proxy (Caddy/nginx) — оставьте 80. Если прямой доступ — укажите нужный порт.</div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="render('check')">← Назад</button>
      <button class="btn btn-primary" onclick="saveConfig()">Далее →</button>
    </div>
  `;
}

async function saveConfig() {
  const data = {
    DB_NAME: v('db-name') || 'lumeo_db',
    DB_USER: v('db-user') || 'lumeo',
    DB_PORT: v('db-port') || '5432',
    DB_PASSWORD: v('db-pass'),
    JWT_SECRET: v('jwt-secret'),
    CLIENT_URL: v('client-url').replace(/\/$/, ''),
    API_URL: (v('client-url').replace(/\/$/, '')) + '/api',
    EXPOSE_PORT: v('expose-port') || '80',
    nextStep: 'admins',
  };
  if (!data.CLIENT_URL) { alert('Укажите URL сервиса'); return; }
  await api('POST', '/api/config', { step: 'config', data });
  appState.config = { ...appState.config, ...data };
  render('admins');
}

// ─── Step: Admins ─────────────────────────────────────────────────────────────
function renderAdmins() {
  const admins = appState.admins.length ? appState.admins : [{ email:'', password:'', firstName:'', lastName:'', isSuper: true }];
  appState.admins = admins;
  renderAdminsUI();
}

function renderAdminsUI() {
  let cardsHtml = '';
  appState.admins.forEach((a, i) => {
    cardsHtml += `<div class="admin-card" id="admin-card-${i}">
      ${i === 0 ? '<span class="badge">⭐ Главный администратор</span>' : `<button class="admin-remove" onclick="removeAdmin(${i})">×</button>`}
      <div class="row2" style="margin-bottom:0">
        <div class="field"><label>Имя</label><input id="a${i}-fn" placeholder="Иван" value="${a.firstName||''}"/></div>
        <div class="field"><label>Фамилия</label><input id="a${i}-ln" placeholder="Иванов" value="${a.lastName||''}"/></div>
      </div>
      <div class="field"><label>Email</label><input id="a${i}-email" type="email" placeholder="admin@university.edu" value="${a.email||''}"/></div>
      <div class="field"><label>Пароль <span style="color:var(--text2)">(оставьте пустым — сгенерируем)</span></label>
        <div class="input-action"><input id="a${i}-pass" type="password" placeholder="Оставьте пустым для автогенерации" value="${a.password||''}"/>
        <button class="btn btn-secondary btn-sm" onclick="genPass('a${i}-pass',12)">🎲</button></div>
      </div>
    </div>`;
  });

  document.getElementById('app').innerHTML = `
    <div class="card-title">Администраторы</div>
    <div class="card-sub">Создайте минимум одного администратора. Первый будет иметь наивысший уровень доступа. Остальных можно добавить позже в /adminpanel.</div>
    <div class="admin-list" id="admin-list">${cardsHtml}</div>
    <button class="btn btn-secondary btn-sm" onclick="addAdmin()" style="margin-bottom:8px">+ Добавить ещё администратора</button>
    <div class="actions">
      <button class="btn btn-secondary" onclick="render('config')">← Назад</button>
      <button class="btn btn-primary" onclick="saveAdmins()">Далее →</button>
    </div>
  `;
}

function addAdmin() {
  saveAdminsToState();
  appState.admins.push({ email:'', password:'', firstName:'', lastName:'' });
  renderAdminsUI();
}

function removeAdmin(i) {
  saveAdminsToState();
  appState.admins.splice(i, 1);
  renderAdminsUI();
}

function saveAdminsToState() {
  appState.admins = appState.admins.map((_, i) => ({
    firstName: v(`a${i}-fn`),
    lastName: v(`a${i}-ln`),
    email: v(`a${i}-email`),
    password: v(`a${i}-pass`),
  }));
}

async function saveAdmins() {
  saveAdminsToState();
  if (!appState.admins[0]?.email) { alert('Укажите email главного администратора'); return; }
  await api('POST', '/api/config', { step: 'admins', data: { admins: appState.admins, nextStep: 'email' } });
  render('email');
}

// ─── Step: Email ──────────────────────────────────────────────────────────────
function renderEmail() {
  const c = appState.config;
  document.getElementById('app').innerHTML = `
    <div class="card-title">Настройки Email</div>
    <div class="optional-badge">⏭ Необязательный шаг — можно настроить позже в <strong>/adminpanel</strong></div>
    <div class="card-sub">Email используется для сброса пароля, уведомлений и подтверждения регистрации. Если пропустите — эти функции будут недоступны.</div>

    <div class="row2">
      <div class="field"><label>SMTP хост</label><input id="smtp-host" placeholder="smtp.gmail.com" value="${c.SMTP_HOST||''}"/>
        <div class="hint">Gmail: smtp.gmail.com · Yandex: smtp.yandex.ru · Mail.ru: smtp.mail.ru</div>
      </div>
      <div class="field"><label>SMTP порт</label><input id="smtp-port" placeholder="587" value="${c.SMTP_PORT||'587'}"/>
        <div class="hint">587 (STARTTLS) или 465 (SSL)</div>
      </div>
    </div>
    <div class="field"><label>Логин SMTP</label><input id="smtp-user" placeholder="noreply@university.edu" value="${c.SMTP_USER||''}"/>
      <div class="hint">Для Gmail нужен <a href="https://myaccount.google.com/apppasswords" target="_blank">App Password</a> (не обычный пароль аккаунта)</div>
    </div>
    <div class="field"><label>Пароль SMTP</label><input id="smtp-pass" type="password" placeholder="App Password или пароль почты" value="${c.SMTP_PASS||''}"/></div>
    <div class="field"><label>Адрес отправителя</label><input id="smtp-from" placeholder="Lumeo LMS &lt;noreply@university.edu&gt;" value="${c.SMTP_FROM||''}"/></div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="render('admins')">← Назад</button>
      <div class="actions-right">
        <button class="btn btn-secondary" onclick="skipEmail()">Пропустить</button>
        <button class="btn btn-primary" onclick="saveEmail()">Далее →</button>
      </div>
    </div>
  `;
}

async function skipEmail() {
  await api('POST', '/api/config', { step: 'skip', data: { stepName: 'email', nextStep: 'install' } });
  appState.skippedSteps.push('email');
  render('install');
}

async function saveEmail() {
  const host = v('smtp-host');
  if (!host) { await skipEmail(); return; }
  const data = {
    SMTP_HOST: host,
    SMTP_PORT: v('smtp-port') || '587',
    SMTP_USER: v('smtp-user'),
    SMTP_PASS: v('smtp-pass'),
    SMTP_FROM: v('smtp-from') || v('smtp-user'),
    nextStep: 'install',
  };
  await api('POST', '/api/config', { step: 'email', data });
  appState.config = { ...appState.config, ...data };
  render('install');
}

// ─── Step: Install ────────────────────────────────────────────────────────────
function renderInstall() {
  renderStepsBar('install');
  const skipped = appState.skippedSteps || [];
  let summaryHtml = '';
  if (skipped.length) {
    summaryHtml = `<div class="alert alert-warn">⏭ Пропущено: ${skipped.map(s=>({email:'Email'})[s]||s).join(', ')} — можно настроить после в <strong>/adminpanel</strong></div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="card-title">🚀 Установка Lumeo</div>
    <div class="card-sub">Сейчас загрузим Docker образы и запустим все сервисы. Это может занять 3-5 минут.</div>
    ${summaryHtml}
    <div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="terminal" id="terminal"><span style="color:var(--text2)">Нажмите кнопку ниже чтобы начать установку...</span></div>
    <div class="actions">
      <div id="install-status"></div>
      <button class="btn btn-primary" id="btn-install" onclick="startInstall()">▶ Начать установку</button>
    </div>
  `;

  // Если уже устанавливается — подключаемся к логам
  if (appState.installing) startLogStream();
}

async function startInstall() {
  document.getElementById('btn-install').disabled = true;
  document.getElementById('btn-install').textContent = '⏳ Устанавливаем...';
  document.getElementById('terminal').innerHTML = '';
  await api('POST', '/api/install');
  startLogStream();
}

function startLogStream() {
  if (logEs) logEs.close();
  logEs = new EventSource('/api/install-logs');
  let progress = 5;

  logEs.onmessage = (e) => {
    const data = JSON.parse(e.data);
    const term = document.getElementById('terminal');
    if (!term) return;

    if (data.type === 'done') {
      logEs.close();
      progress = 100;
      updateProgress(100);
      setTimeout(() => { appState.installed = true; appState.step = 'done'; render('done'); }, 800);
      return;
    }
    if (data.type === 'failed') {
      logEs.close();
      const btn = document.getElementById('btn-install');
      if (btn) { btn.disabled = false; btn.textContent = '🔄 Попробовать снова'; }
      return;
    }

    const line = document.createElement('div');
    line.className = `log-${data.type || 'log'}`;
    line.textContent = data.text;
    term.appendChild(line);
    term.scrollTop = term.scrollHeight;

    if (data.type === 'info' || data.type === 'success') progress = Math.min(progress + 8, 90);
    updateProgress(progress);
  };
}

function updateProgress(val) {
  const bar = document.getElementById('prog-bar');
  if (bar) bar.style.width = val + '%';
}

// ─── Step: Done ───────────────────────────────────────────────────────────────
async function renderDone() {
  renderStepsBar('done');
  const { credentials } = await api('GET', '/api/credentials').catch(() => ({ credentials: null }));
  const skipped = appState.skippedSteps || [];
  const clientUrl = appState.config.CLIENT_URL || '';

  let credHtml = '';
  if (credentials && Object.keys(credentials).length) {
    showCredentialsModal(credentials, clientUrl);
  }

  let skippedHtml = '';
  if (skipped.length) {
    const labels = { email: 'Email / SMTP — нужен для сброса пароля и уведомлений' };
    skippedHtml = `<div class="skipped-list">
      <h4>⚠️ Не забудьте настроить пропущенные шаги:</h4>
      <ul>${skipped.map(s=>`<li>${labels[s]||s} → <a href="${clientUrl}/adminpanel" target="_blank">/adminpanel</a></li>`).join('')}</ul>
    </div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="done-icon">🎉</div>
    <div class="done-title">Lumeo успешно установлен!</div>
    <div class="done-sub">Все сервисы запущены и готовы к работе. Войдите под учётной записью администратора чтобы начать.</div>
    ${skippedHtml}
    <button class="open-btn" onclick="window.open('${clientUrl}','_blank')">Открыть Lumeo →</button>
  `;
}

function showCredentialsModal(creds, clientUrl) {
  let timer = 30;
  const timerLabel = () => timer > 0 ? `<span>${timer}с</span>` : '';
  const btnLabel = () => timer > 0 ? `Я записал (${timer}с)` : 'Я записал и сохранил данные';

  const rows = [
    creds.ADMIN_EMAIL && `<div class="cred-row"><span class="cred-label">Email админа</span><span class="cred-val">${creds.ADMIN_EMAIL}</span></div>`,
    creds.ADMIN_PASSWORD && `<div class="cred-row"><span class="cred-label">Пароль админа</span><span class="cred-val">${creds.ADMIN_PASSWORD}</span></div>`,
    creds.DB_PASSWORD && `<div class="cred-row"><span class="cred-label">Пароль БД</span><span class="cred-val">${creds.DB_PASSWORD}</span></div>`,
    creds.JWT_SECRET && `<div class="cred-row"><span class="cred-label">JWT Secret</span><span class="cred-val" style="font-size:.75rem">${creds.JWT_SECRET}</span></div>`,
  ].filter(Boolean).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <div class="modal-warn">
      <strong>⚠️ ДАННЫЕ БУДУТ ПОКАЗАНЫ ТОЛЬКО ОДИН РАЗ</strong>
      <span>Запишите или сохраните их прямо сейчас. После закрытия окна они недоступны.</span>
    </div>
    ${rows}
    <div class="modal-timer">Кнопка станет активна через ${timerLabel()}</div>
    <button class="btn btn-primary" id="cred-btn" style="width:100%;margin-top:16px;justify-content:center" disabled onclick="closeCredModal()">${btnLabel()}</button>
  </div>`;
  document.body.appendChild(overlay);

  const interval = setInterval(() => {
    timer--;
    const timerEl = overlay.querySelector('.modal-timer');
    const btn = overlay.querySelector('#cred-btn');
    if (timerEl) timerEl.innerHTML = timer > 0 ? `Кнопка станет активна через <span>${timer}с</span>` : 'Нажмите кнопку когда сохраните данные';
    if (btn) { btn.textContent = btnLabel(); if (timer <= 0) { btn.disabled = false; clearInterval(interval); } }
  }, 1000);

  window._credOverlay = overlay;
}

function closeCredModal() {
  if (window._credOverlay) window._credOverlay.remove();
}

// ─── Updater mode ─────────────────────────────────────────────────────────────
async function renderUpdater() {
  document.getElementById('steps-bar').style.display = 'none';
  const { current, latest } = await api('GET', '/api/check-updates').catch(() => ({ current: '?', latest: '?' }));
  document.getElementById('app').innerHTML = `
    <div class="updater-card">
      <div class="updater-icon">🔄</div>
      <div class="updater-title">LumeoLoadpad — Updater</div>
      <div class="updater-sub">Lumeo установлен и работает. Этот сервис используется для обновлений — управляйте им через <strong>/adminpanel → Обновления</strong>.</div>
      <div class="check-item" style="margin-bottom:12px"><div class="check-label">Текущая версия</div><div class="check-value">${current}</div></div>
      <div class="check-item"><div class="check-label">Доступная версия</div><div class="check-value">${latest}</div></div>
    </div>
  `;
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function genPass(id, len = 32) {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  let pass = '';
  for (let i = 0; i < len; i++) pass += chars[Math.floor(Math.random() * chars.length)];
  const el = document.getElementById(id);
  if (el) { el.value = pass; el.type = 'text'; setTimeout(() => el.type = 'password', 3000); }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
